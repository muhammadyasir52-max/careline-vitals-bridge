<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareLine EMR Simulator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>CareLine EMR Simulator</h1>
    <p class="subtitle">FHIR R4 (OpenMRS/Bahmni-compatible) — for demoing the CareLine Vitals Bridge</p>
  </header>

  <main>
    <section class="panel">
      <h2>Patients</h2>
      <ul id="patient-list" class="patient-list"></ul>
    </section>

    <section class="panel">
      <h2 id="chart-title">Patient chart — vital signs</h2>
      <p class="hint">Auto-refreshes every 2 seconds. Send readings via the CareLine Vitals Bridge to see them appear here.</p>
      <table id="obs-table">
        <thead>
          <tr><th>Recorded</th><th>Vital</th><th>Value</th><th>Source device</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
