services:
  - type: web
    name: careline-vitals-bridge-api
    runtime: node
    rootDir: packages/cloud-api
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
    healthCheckPath: /health

  - type: web
    name: careline-vitals-bridge-admin
    runtime: node
    rootDir: packages/admin-portal
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ADMIN_PORTAL_PORT
        value: 4000
      - key: HOST
        value: 0.0.0.0

  - type: web
    name: careline-emr-sim
    runtime: node
    rootDir: packages/emr-sim
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: EMR_SIM_PORT
        value: 6010
      - key: HOST
        value: 0.0.0.0

  - type: web
    name: careline-ble-capture
    runtime: node
    rootDir: packages/ble-capture-web
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: BLE_CAPTURE_PORT
        value: 7000
      - key: HOST
        value: 0.0.0.0
